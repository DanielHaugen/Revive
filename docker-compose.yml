version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:${POSTGRES_PORT}'
    networks:
      - my_network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nextjs_app:
    build: .
    container_name: nextjs_app
    ports:
      - '3000:3000'
    networks:
      - my_network
    env_file:
      - .env # Load environment variables from the .env file
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - postgres

volumes:
  postgres-data:
    driver: local

networks:
  my_network:
    driver: bridge
